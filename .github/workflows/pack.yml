name: Pack NPM Packages

on:
  pull_request:
  workflow_dispatch:
    inputs:
      pack_native:
        description: 'Pack @nexusmods/fomod-installer-native'
        type: boolean
        default: true
      pack_ipc:
        description: 'Pack @nexusmods/fomod-installer-ipc'
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-native:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.pack_native }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
          - os: ubuntu-latest
            platform: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.x'

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build native binaries
        run: |
          pnpm --filter @nexusmods/fomod-installer-native build-native
          pnpm --filter @nexusmods/fomod-installer-native build-napi

      - name: Copy native artifacts to platform dir
        working-directory: src/ModInstaller.Native.TypeScript
        shell: bash
        run: |
          mkdir -p artifacts/${{ matrix.platform }}
          cp build/Release/modinstaller.node artifacts/${{ matrix.platform }}/
          if [ "${{ matrix.platform }}" = "win32-x64" ]; then
            cp ModInstaller.Native.dll artifacts/${{ matrix.platform }}/
          elif [ "${{ matrix.platform }}" = "linux-x64" ]; then
            cp ModInstaller.Native.so artifacts/${{ matrix.platform }}/
          fi

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: src/ModInstaller.Native.TypeScript/artifacts/${{ matrix.platform }}/

  pack-native:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.pack_native }}
    needs: build-native
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build webpack bundle and declarations
        run: pnpm --filter @nexusmods/fomod-installer-native build-webpack

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: src/ModInstaller.Native.TypeScript/dist/
          pattern: native-*
          merge-multiple: false

      - name: Move platform artifacts into dist
        working-directory: src/ModInstaller.Native.TypeScript
        shell: bash
        run: |
          for dir in dist/native-*/; do
            platform=$(basename "$dir" | sed 's/^native-//')
            mkdir -p "dist/$platform"
            cp -r "$dir"* "dist/$platform/"
            rm -rf "$dir"
          done
          echo "=== dist/ contents ==="
          find dist/ -type f

      - name: Pack
        working-directory: src/ModInstaller.Native.TypeScript
        run: npm pack

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: nexusmods-fomod-installer-native
          path: src/ModInstaller.Native.TypeScript/*.tgz

  pack-ipc:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.pack_ipc }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.x'

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install and build IPC
        run: |
          pnpm install
          pnpm --filter @nexusmods/fomod-installer-ipc build

      - name: Pack
        working-directory: src/ModInstaller.IPC.TypeScript
        run: npm pack

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: nexusmods-fomod-installer-ipc
          path: src/ModInstaller.IPC.TypeScript/*.tgz
